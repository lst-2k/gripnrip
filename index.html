<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grip & Rip Rebirth - Season Standings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --div1: #0047AB; --div2: #008B8B; --div3: #D2691E; --gold: #FFD700; 
            --header-grad: linear-gradient(180deg, #1a1a1a 0%, #000000 100%); 
            --info-grad: linear-gradient(135deg, #4a4a4a 0%, #2d2d2d 100%);
            --red: #dc3545; --green: #28a745;
        }
        body { background-color: #000; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .leaderboard-container { width: 100%; margin: 0; background: white; }
        .header { background: var(--header-grad); text-align: center; border-bottom: 3px solid var(--gold); line-height: 0; }
        .logo-img, .event-banner { width: 100%; height: auto; display: block; }
        .info-bar { background: var(--info-grad); color: #fff; padding: 10px; display: flex; justify-content: center; gap: 15px; border-bottom: 2px solid var(--gold); font-weight: 800; text-transform: uppercase; }
        .label { color: var(--gold); margin-right: 5px; }
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        thead th { background: #eee; font-size: 11px; padding: 8px; border-bottom: 2px solid #ddd; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #eee; font-size: 14px; font-weight: 600; }
        .div-header { color: white; padding: 8px 15px; font-size: 18px; font-weight: bold; text-transform: uppercase; }
        .div-1 { background: var(--div1); } .div-2 { background: var(--div2); } .div-3 { background: var(--div3); } 
        .name-cell { display: flex; align-items: center; text-align: left; padding-left: 15px; }
        .plat-icon { width: 18px; margin-right: 10px; }
        .pts-col { font-weight: 900; background: #fffde7; }
        .award-footer { background: #f9f9f9; padding: 12px; font-size: 14px; font-weight: bold; text-align: center; border-top: 1px solid #ddd; }
        .history-section { background: #f4f4f4; padding: 20px 0; }
        .week-dropdown { width: 95%; margin: 10px auto; background: white; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .week-header { background: #333; color: var(--gold); padding: 10px 20px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 800; }
        .week-content { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <div class="leaderboard-container">
        <div class="header">
            <img src="logo.png" class="logo-img">
            <img src="event.png" class="event-banner">
        </div>
        <div id="info-bar" class="info-bar">Loading...</div>
        <div id="live-tables"></div>
    </div>

    <div class="leaderboard-container">
        <div style="background:#222; color:var(--gold); padding:15px; text-align:center; font-weight:900; font-size:22px;">SEASON STANDINGS</div>
        <div id="season-tables"></div>
    </div>

    <div class="history-section">
        <div style="text-align:center; font-weight:900; font-size:20px; margin-bottom:15px;">EVENT HISTORY</div>
        <div id="history-container"></div>
    </div>

<script>
    const ptsMap = [100, 90, 80, 70, 60, 50, 40, 30, 20, 10];

    async function loadData() {
        const res = await fetch('GR_Backup.json?t=' + Date.now());
        const state = await res.json();
        renderPage(state);
    }

    function getNum(val) {
        if (!val || val === '-' || val === '.') return null;
        return (val.toString().toUpperCase() === 'E') ? 0 : Number(val);
    }

    function calculateLivePoints(player, divPlayers, isSig, isDB) {
        const score = getNum(player.toPar);
        if (score === null) return 0;
        const multiplier = isSig ? 2 : 1;
        const bonusMult = isDB ? 2 : 1;
        const scored = divPlayers.filter(p => getNum(p.toPar) !== null).sort((a,b) => getNum(a.toPar) - getNum(b.toPar));
        const rankIdx = scored.findIndex(p => getNum(p.toPar) === score);
        let base = (rankIdx !== -1 && rankIdx < ptsMap.length) ? ptsMap[rankIdx] : 5;
        
        let bonus = 0;
        const putts = divPlayers.map(p => getNum(p.putt)).filter(v => v > 0);
        const maxP = putts.length ? Math.max(...putts) : 0;
        const holes = divPlayers.map(p => getNum(p.hole)).filter(v => v > 0);
        const maxH = holes.length ? Math.max(...holes) : 0;

        if (getNum(player.putt) === maxP && maxP > 0) bonus += 25;
        if (getNum(player.hole) === maxH && maxH > 0) bonus += 25;
        bonus += (parseInt(player.hio)||0)*50 + (parseInt(player.albatross)||0)*50;
        return (base + (bonus * bonusMult)) * multiplier;
    }

    function renderPage(state) {
        document.getElementById('info-bar').innerHTML = `<span class="label">Week</span> ${state.week} | <span class="label">Venue</span> ${state.venue}`;
        
        const live = document.getElementById('live-tables');
        const season = document.getElementById('season-tables');
        live.innerHTML = ''; season.innerHTML = '';

        [1,2,3].forEach(div => {
            let activePlayers = state.players.filter(p => String(p.division) === String(div) && !p.archived);
            if (!activePlayers.length) return;

            // Live Table
            let sortedLive = [...activePlayers].sort((a,b) => (getNum(a.toPar)??999) - (getNum(b.toPar)??999));
            let liveHtml = `<div class="div-header div-${div}">Div ${div} Live</div><table><thead><tr><th>POS</th><th style="text-align:left; padding-left:15px;">PLAYER</th><th>TO PAR</th><th class="pts-col">PTS</th></tr></thead><tbody>`;
            sortedLive.forEach((p, i) => {
                const lp = calculateLivePoints(p, activePlayers, state.isSignature, state.isDoubleBonus);
                liveHtml += `<tr><td>${getNum(p.toPar)!==null ? i+1 : '-'}</td><td><div class="name-cell">${getIcon(p.platform)}${p.name}</div></td><td style="color:${getNum(p.toPar)<=0?'var(--green)':'#000'}">${p.toPar||'-'}</td><td class="pts-col">${getNum(p.toPar)!==null?lp:0}</td></tr>`;
            });
            
            const maxP = Math.max(...activePlayers.map(p => getNum(p.putt)||0));
            const bestP = activePlayers.find(p => getNum(p.putt) === maxP && maxP > 0);
            const maxH = Math.max(...activePlayers.map(p => getNum(p.hole)||0));
            const bestH = activePlayers.find(p => getNum(p.hole) === maxH && maxH > 0);

            live.innerHTML += liveHtml + `</tbody></table><div class="award-footer">Putt: ${bestP ? bestP.name : '--'} | Hole: ${bestH ? bestH.name : '--'}</div>`;

            // Season Table
            let sortedSeason = activePlayers.map(p => ({
                p, 
                acc: (p.history||[]).reduce((a,b)=>a+(Number(b)||0),0) + (getNum(p.toPar)||0),
                total: (p.seasonPts||0) + calculateLivePoints(p, activePlayers, state.isSignature, state.isDoubleBonus)
            })).sort((a,b) => b.total - a.total || a.acc - b.acc);

            let seasHtml = `<div class="div-header div-${div}">Div ${div} Standings</div><table><thead><tr><th>RK</th><th style="text-align:left; padding-left:15px;">PLAYER</th><th>ACCUM</th><th class="pts-col">TOTAL</th></tr></thead><tbody>`;
            sortedSeason.forEach((item, i) => {
                seasHtml += `<tr><td>${i+1}</td><td><div class="name-cell">${getIcon(item.p.platform)}${item.p.name}</div></td><td>${item.acc}</td><td class="pts-col">${item.total}</td></tr>`;
            });
            season.innerHTML += seasHtml + `</tbody></table>`;
        });

        // History
        const histCont = document.getElementById('history-container');
        histCont.innerHTML = '';
        for (let w = parseInt(state.week)-1; w >= 1; w--) {
            let weekHtml = `<div class="week-dropdown"><div class="week-header" onclick="this.nextElementSibling.classList.toggle('active')">Week ${w} Results <i class="fa-solid fa-chevron-down"></i></div><div class="week-content">`;
            [1,2,3].forEach(div => {
                // Include everyone (including archived) who played that week
                let histPlayers = state.players.filter(p => String(p.division) === String(div) && p.history && p.history[w-1] !== undefined && p.history[w-1] !== "-");
                if (!histPlayers.length) return;
                
                let sortedHist = histPlayers.map(p => ({
                    p, 
                    score: getNum(p.history[w-1]), 
                    pts: (p.pointsHistory && p.pointsHistory[w-1] !== undefined) ? p.pointsHistory[w-1] : 0 
                })).sort((a,b) => b.pts - a.pts || a.score - b.score);

                weekHtml += `<div class="div-header div-${div}" style="font-size:12px;">Division ${div}</div><table><tbody>`;
                sortedHist.forEach((item, i) => {
                    weekHtml += `<tr><td>${i+1}</td><td style="text-align:left; padding-left:15px;">${item.p.name}</td><td>${item.score}</td><td class="pts-col">${item.pts}</td></tr>`;
                });
                weekHtml += `</tbody></table>`;
            });
            histCont.innerHTML += weekHtml + `</div></div>`;
        }
    }

    function getIcon(p) {
        if (p === 'xbox') return '<i class="fa-brands fa-xbox plat-icon" style="color:#107C10"></i>';
        if (p === 'playstation') return '<i class="fa-brands fa-playstation plat-icon" style="color:#003087"></i>';
        return '<i class="fa-brands fa-steam plat-icon" style="color:#171a21"></i>';
    }

    loadData();
</script>
</body>
</html>
