<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grip & Rip Rebirth - Season Standings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --div1: #0047AB; --div2: #008B8B; --div3: #D2691E; --gold: #FFD700; 
            --header-grad: linear-gradient(180deg, #1a1a1a 0%, #000000 100%); 
            --info-grad: linear-gradient(135deg, #4a4a4a 0%, #2d2d2d 100%);
            --red: #dc3545; --green: #28a745;
            --promo: rgba(40, 167, 69, 0.2); 
            --releg: rgba(220, 53, 69, 0.2); 
            --glow: 0px 3px 10px rgba(255, 215, 0, 0.3);
        }
        body { background-color: #000; margin: 0; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        .leaderboard-container { width: 100%; margin: 0; background: white; position: relative; }
        
        .header { background: var(--header-grad); text-align: center; border-bottom: 3px solid var(--gold); box-shadow: var(--glow); line-height: 0; }
        .logo-img, .event-banner { width: 100%; height: auto; display: block; object-fit: contain; }

        .info-bar { background: var(--info-grad); color: #fff; padding: 10px; display: flex; justify-content: center; align-items: center; border-bottom: 2px solid var(--gold); flex-wrap: wrap; gap: 15px; }
        .info-item { display: flex; align-items: center; font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .label { color: var(--gold); margin-right: 8px; font-size: 13px; }

        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        thead th { background: #eee; font-size: 11px; padding: 8px 4px; border-bottom: 2px solid #ddd; color: #444; text-transform: uppercase; }
        td { padding: 6px 4px; text-align: center; border-bottom: 1px solid #eee; font-size: 14px; font-weight: 600; }
        
        .div-header { color: white; padding: 8px 15px; font-size: 18px; font-weight: bold; text-transform: uppercase; }
        .div-1 { background: var(--div1); } .div-2 { background: var(--div2); } .div-3 { background: var(--div3); } 

        .name-cell { display: flex; align-items: center; text-align: left; padding-left: 15px; min-width: 180px; gap: 8px; }
        .plat-icon { width: 18px; font-size: 15px; text-align: center; }
        
        .pts-col { font-weight: 900; color: #333; background: rgba(255, 253, 231, 0.8); min-width: 60px; }
        .accum-col { font-weight: 800; color: #555; min-width: 60px; }
        
        .award-footer { background: #f9f9f9; font-weight: bold; border-top: 2px solid #ddd; text-align: center; padding: 12px; font-size: 15px; color: #333; }

        .season-header { background: #222; color: var(--gold); padding: 15px; font-size: 22px; font-weight: 900; text-align: center; text-transform: uppercase; border-bottom: 4px solid var(--gold); }

        .history-section { background: #f4f4f4; padding: 15px 0; border-top: 4px solid #333; }
        .history-title { text-align: center; font-weight: 900; text-transform: uppercase; font-size: 20px; margin-bottom: 15px; color: #222; }
        .week-dropdown { width: 95%; max-width: 1200px; margin: 8px auto; background: white; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
        
        /* DROPDOWN FIX */
        .week-header { background: #333; color: var(--gold); padding: 12px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 16px; user-select: none; }
        .week-header:hover { background: #444; }
        .week-content { display: none; padding-bottom: 10px; }
        .week-content.active { display: block; }
        
        .logo-break { background: #000; padding: 8px 0; text-align: center; border-top: 3px solid var(--gold); border-bottom: 3px solid var(--gold); margin: 0; line-height: 0; }
        .break-img { width: 80%; max-width: 400px; height: auto; display: inline-block; }
    </style>
</head>
<body>

    <div class="leaderboard-container">
        <div class="header">
            <img src="logo.png" alt="Grip & Rip Rebirth" class="logo-img">
            <img src="event.png" alt="Event Banner" class="event-banner">
        </div>
        <div id="info-bar" class="info-bar">Loading...</div>
        <div id="live-tables"></div>
    </div>

    <div class="leaderboard-container">
        <div class="season-header">Season Standings</div>
        <div id="season-tables"></div>
    </div>

    <div class="history-section">
        <div class="history-title"><i class="fa-solid fa-clock-rotate-left"></i> Event History</div>
        <div id="history-container"></div>
    </div>

    <div class="logo-break"><img src="2k25 logo.png" alt="PGA 2K25" class="break-img"></div>

<script>
    const ptsMap = [100, 90, 80, 70, 60, 50, 40, 30, 20, 10];

    async function loadLeaderboard() {
        try {
            const response = await fetch('GR_Backup.json?t=' + Date.now());
            if (!response.ok) throw new Error("Data file not found.");
            const state = await response.json();
            renderInfo(state);
            renderLive(state);
            renderSeason(state);
            renderHistory(state);
        } catch (err) {
            document.getElementById('live-tables').innerHTML = `<div style="padding:50px; text-align:center; color:red;">${err.message}</div>`;
        }
    }

    function getNum(val) {
        if (val === undefined || val === null || val === '' || val === '-' || val === '.') return null;
        if (typeof val === 'string' && val.toUpperCase() === 'E') return 0;
        const n = Number(val); return isNaN(n) ? null : n;
    }

    function getScoreColor(val) {
        const n = getNum(val);
        if (n === null) return 'black';
        if (n < 0) return 'var(--red)';
        if (n === 0) return 'var(--green)';
        return 'black';
    }

    function calculateBasePoints(score, divisionScores) {
        if (score === null) return 0;
        const validScores = divisionScores.filter(s => s !== null).sort((a, b) => a - b);
        const tieRankIdx = validScores.indexOf(score);
        return (tieRankIdx !== -1 && tieRankIdx < ptsMap.length) ? ptsMap[tieRankIdx] : 5;
    }

    function calculateLivePoints(player, divisionPlayers, isSignature) {
        const score = getNum(player.toPar);
        if (score === null) return 0;
        const multiplier = isSignature ? 2 : 1;
        const basePts = calculateBasePoints(score, divisionPlayers.map(p => getNum(p.toPar)));
        let bonusPts = (getNum(player.hio) || 0) * 50 + (getNum(player.albatross) || 0) * 50;
        return (basePts + bonusPts) * multiplier;
    }

    function renderInfo(state) {
        document.getElementById('info-bar').innerHTML = `
            <div class="info-item"><span class="label">Season</span> ${state.season || 1}</div>
            <div class="info-item"><span class="label">Week</span> ${state.week || 1}</div>
            <div class="info-item"><span class="label">Venue</span> ${state.venue || 'TBA'}</div>
        `;
    }

    const getIcon = (p) => {
        if (p === 'xbox') return '<i class="fa-brands fa-xbox plat-icon" style="color:#107C10"></i>';
        if (p === 'playstation') return '<i class="fa-brands fa-playstation plat-icon" style="color:#003087"></i>';
        return '<i class="fa-brands fa-steam plat-icon" style="color:#171a21"></i>';
    };

    function renderLive(state) {
        const container = document.getElementById('live-tables');
        container.innerHTML = '';
        [1, 2, 3].forEach(divNum => {
            let divPlayers = state.players.filter(p => String(p.division) === String(divNum) && !p.archived);
            let sorted = [...divPlayers].sort((a,b) => (getNum(a.toPar) ?? 999) - (getNum(b.toPar) ?? 999));
            if (sorted.length === 0) return;

            const validPutts = divPlayers.map(p => ({name: p.name, val: getNum(p.putt)})).filter(v => v.val !== null && v.val > 0);
            const bestPutt = validPutts.length ? validPutts.reduce((prev, curr) => (prev.val > curr.val) ? prev : curr) : null;
            const validHoles = divPlayers.map(p => ({name: p.name, val: getNum(p.hole)})).filter(v => v.val !== null && v.val > 0);
            const bestHole = validHoles.length ? validHoles.reduce((prev, curr) => (prev.val > curr.val) ? prev : curr) : null;

            let html = `<div class="div-section"><div class="div-header div-${divNum}">Div ${divNum} Live Board</div><div class="table-responsive"><table>
                <thead><tr><th>POS</th><th style="text-align:left; padding-left:15px;">PLAYER</th><th>TO PAR</th><th>PUTT</th><th>SHOT</th><th>ACE</th><th>ALBY</th><th class="pts-col">LIVE PTS</th></tr></thead><tbody>`;
            
            sorted.forEach((p) => {
                const score = getNum(p.toPar);
                const firstWithScore = sorted.find(person => getNum(person.toPar) === score);
                const displayRank = sorted.indexOf(firstWithScore) + 1;
                html += `<tr><td>${score !== null ? displayRank : '-'}</td><td><div class="name-cell">${getIcon(p.platform)}<span>${p.name}</span></div></td>
                    <td style="color:${getScoreColor(p.toPar)}">${p.toPar || '-'}</td>
                    <td>${p.putt || '-'}</td><td>${p.hole || '-'}</td><td>${p.hio || '-'}</td><td>${p.albatross || '-'}</td>
                    <td class="pts-col">${score !== null ? calculateLivePoints(p, divPlayers, state.isSignature) : 0}</td></tr>`;
            });
            html += `</tbody></table></div>
                <div class="award-footer">
                    <span style="margin: 0 25px;"><i class="fa-solid fa-flag"></i> Longest Putt: <strong>${bestPutt ? `${bestPutt.name} (${bestPutt.val}ft)` : '--'}</strong></span>
                    <span style="margin: 0 25px;"><i class="fa-solid fa-bullseye"></i> Longest Hole-out: <strong>${bestHole ? `${bestHole.name} (${bestHole.val}yds)` : '--'}</strong></span>
                </div>
            </div>`;
            container.innerHTML += html;
        });
    }

    function renderSeason(state) {
        const container = document.getElementById('season-tables');
        container.innerHTML = '';
        [1, 2, 3].forEach(divNum => {
            let divPlayers = state.players.filter(p => String(p.division) === String(divNum) && !p.archived);
            let sorted = divPlayers.map(p => {
                const livePts = calculateLivePoints(p, divPlayers, state.isSignature);
                const histTotal = (p.history || []).reduce((sum, s) => sum + (Number(s) || 0), 0);
                return { 
                    ...p, 
                    projPts: (Number(p.seasonPts) || 0) + livePts, 
                    accum: histTotal + (getNum(p.toPar) || 0),
                    projWins: (Number(p.wins) || 0),
                    projEvents: (Number(p.events) || 0) + (getNum(p.toPar) !== null ? 1 : 0)
                };
            }).sort((a,b) => b.projPts - a.projPts || a.accum - b.accum);
            
            if (sorted.length === 0) return;

            let html = `<div class="season-section"><div class="div-header div-${divNum}">Div ${divNum} Standings</div><div class="table-responsive"><table>
                <thead><tr><th>RK</th><th style="text-align:left; padding-left:15px;">PLAYER</th><th>ACCUM</th><th>WINS</th><th>EVTS</th><th class="pts-col">TOTAL</th></tr></thead><tbody>`;
            
            sorted.forEach((p, i) => {
                html += `<tr><td>${i+1}</td><td><div class="name-cell">${getIcon(p.platform)}<span>${p.name}</span></div></td>
                    <td class="accum-col" style="color:${getScoreColor(p.accum)}">${p.accum > 0 ? '+' + p.accum : (p.accum === 0 ? 'E' : p.accum)}</td>
                    <td>${p.projWins}</td><td>${p.projEvents}</td>
                    <td class="pts-col">${p.projPts}</td></tr>`;
            });
            container.innerHTML += html + `</tbody></table></div></div>`;
        });
    }

    function toggleWeek(el) {
        const content = el.nextElementSibling;
        content.classList.toggle('active');
        const icon = el.querySelector('i');
        if (content.classList.contains('active')) {
            icon.className = 'fa-solid fa-chevron-up';
        } else {
            icon.className = 'fa-solid fa-chevron-down';
        }
    }

function renderHistory(state) {
    const container = document.getElementById('history-container');
    container.innerHTML = '';
    
    // We look at the total number of entries in any player's history to find the max weeks
    const maxWeeks = state.players.reduce((max, p) => Math.max(max, (p.history ? p.history.length : 0)), 0);
    
    // If no history exists at all
    if (maxWeeks === 0) {
        container.innerHTML = '<div style="text-align:center; padding:20px; color:#666;">No historical data available yet.</div>';
        return;
    }

    // Loop backwards from the most recent completed week
    for (let w = maxWeeks; w >= 1; w--) {
        let weekHtml = `<div class="week-dropdown">
            <div class="week-header" onclick="toggleWeek(this)">
                <span>Week ${w} Results</span><i class="fa-solid fa-chevron-down"></i>
            </div>
            <div class="week-content">`;

        let weekHasData = false;

        [1, 2, 3].forEach(divNum => {
            // Check ALL players (including archived) who have a score for this specific week
            const playersInDiv = state.players.filter(p => 
				p.history && 
				p.history[w-1] !== undefined && 
				p.history[w-1] !== "-"
				// Note: We don't filter by p.division here if we want a master history,
				// OR we check where they WERE that week. 
			);

            if (playersInDiv.length === 0) return;
            weekHasData = true;

            const weekScores = playersInDiv.map(p => getNum(p.history[w-1]));
            
            const playersWithData = playersInDiv.map(p => {
                const s = getNum(p.history[w-1]);
                // Use pointsHistory if your admin saved it, otherwise calculate live
                const totalPts = (p.pointsHistory && p.pointsHistory[w-1] !== undefined) 
                                 ? p.pointsHistory[w-1] 
                                 : calculateBasePoints(s, weekScores);
                return { ...p, currentScore: s, currentPts: totalPts };
            }).sort((a,b) => b.currentPts - a.currentPts || (a.currentScore ?? 999) - (b.currentScore ?? 999));

            weekHtml += `<div class="div-header div-${divNum}" style="font-size:12px; padding: 5px 15px;">Div ${divNum}</div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th style="width:50px">POS</th>
                            <th style="text-align:left; padding-left:15px;">PLAYER</th>
                            <th>SCORE</th>
                            <th class="pts-col">PTS</th>
                        </tr>
                    </thead>
                    <tbody>`;
            
            playersWithData.forEach((p, idx) => {
                const wkScore = p.currentScore;
                const displayScore = wkScore === 0 ? 'E' : (wkScore > 0 ? '+'+wkScore : wkScore);
                
                weekHtml += `<tr>
                    <td>${idx+1}</td>
                    <td><div class="name-cell">${getIcon(p.platform)}<span>${p.name}</span></div></td>
                    <td style="color:${getScoreColor(wkScore)}">${displayScore}</td>
                    <td class="pts-col" style="color:#0047AB;">${p.currentPts || 0}</td>
                </tr>`;
            });
            weekHtml += `</tbody></table></div>`;
        });

        weekHtml += `</div></div>`;
        
        // Only add the week dropdown if we actually found players with scores
        if (weekHasData) {
            container.innerHTML += weekHtml;
        }
    }
}

    loadLeaderboard();
</script>
</body>
</html>
